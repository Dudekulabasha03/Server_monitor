worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    upstream backend {
        server fleet-monitor-backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server fleet-monitor-frontend:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name fleet-monitor.amd.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name fleet-monitor.amd.com;

        ssl_certificate /etc/nginx/certs/fleet-monitor.crt;
        ssl_certificate_key /etc/nginx/certs/fleet-monitor.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }
    }
}
