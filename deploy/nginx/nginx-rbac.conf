events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend-rbac:3000;
    }

    upstream backend {
        server backend-rbac:8200;
    }

    # AI backend on port 3100 network — for AI endpoints on port 3200
    upstream ai_backend {
        server fleetmon-ai-backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Auth endpoints
        location /auth/ {
            proxy_pass http://backend/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin (RBAC management) endpoints
        location /admin/ {
            proxy_pass http://backend/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI copilot — routed to AI backend (has AI_ENABLED=true, model configured)
        location /api/v1/ai/ {
            proxy_pass http://ai_backend/api/v1/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Long timeout for streaming SSE responses from the LLM
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            proxy_connect_timeout 10s;
            # Disable buffering so SSE tokens stream immediately to the browser
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
        }

        # All other API — RBAC backend (monitoring data from AI postgres)
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Frontend (catch-all)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
