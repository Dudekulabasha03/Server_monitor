version: "3.9"

# AMD Fleet Monitor — Local Development + Production Stack
# Usage: docker compose up -d

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleetmon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetmon
      POSTGRES_USER: fleetmon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetmon_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetmon"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fleetmon-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── VictoriaMetrics (Time-Series DB) ─────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    container_name: fleetmon-vm
    restart: unless-stopped
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=60d"
      - "-httpListenAddr=:8428"
      - "-selfScrapeInterval=10s"
    healthcheck:
      test: ["CMD", "/victoria-metrics-prod", "-version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Grafana (Optional — for raw metric exploration) ───────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: fleetmon-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - victoriametrics

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetmon-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fleetmon:${POSTGRES_PASSWORD:-fleetmon_dev_pw}@postgres:5432/fleetmon
      REDIS_URL: redis://redis:6379/0
      VICTORIA_METRICS_URL: http://victoriametrics:8428
      VICTORIA_METRICS_WRITE_URL: http://victoriametrics:8428/api/v1/import/prometheus
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000"]}
      SMTP_HOST: ${SMTP_HOST:-smtp.amd.com}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      PRISM_ENABLED: ${PRISM_ENABLED:-false}
      PRISM_URL: ${PRISM_URL:-https://prism.amd.com/os-provisioning-api}
      PRISM_USER: ${PRISM_USER:-}
      PRISM_PASSWORD: ${PRISM_PASSWORD:-}
      PRISM_API_KEY: ${PRISM_API_KEY:-}
      PIPT_ENABLED: ${PIPT_ENABLED:-false}
      PIPT_URL: ${PIPT_URL:-http://tsp-dogmatix-blr.amd.com:8787}
      BIOS_API_URL: ${BIOS_API_URL:-http://10.194.168.138:5005}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      victoriametrics:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --reload

  # ── Celery Worker (Collection Scheduler) ─────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetmon-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fleetmon:${POSTGRES_PASSWORD:-fleetmon_dev_pw}@postgres:5432/fleetmon
      REDIS_URL: redis://redis:6379/0
      VICTORIA_METRICS_WRITE_URL: http://victoriametrics:8428/api/v1/import/prometheus
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEFAULT_BMC_USERNAME: ${DEFAULT_BMC_USERNAME:-}
      DEFAULT_BMC_PASSWORD: ${DEFAULT_BMC_PASSWORD:-}
      DEFAULT_OS_USERNAME: ${DEFAULT_OS_USERNAME:-}
      DEFAULT_OS_PASSWORD: ${DEFAULT_OS_PASSWORD:-}
      PRISM_ENABLED: ${PRISM_ENABLED:-false}
      PRISM_URL: ${PRISM_URL:-https://prism.amd.com/os-provisioning-api}
      PRISM_USER: ${PRISM_USER:-}
      PRISM_PASSWORD: ${PRISM_PASSWORD:-}
      PRISM_API_KEY: ${PRISM_API_KEY:-}
      PIPT_ENABLED: ${PIPT_ENABLED:-false}
      PIPT_URL: ${PIPT_URL:-http://tsp-dogmatix-blr.amd.com:8787}
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A app.worker worker --loglevel=info --concurrency=8 --queues=collectors,alerts,discovery

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetmon-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fleetmon:${POSTGRES_PASSWORD:-fleetmon_dev_pw}@postgres:5432/fleetmon
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.worker beat --loglevel=info

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: fleetmon-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fleetmon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  vm_data:
  grafana_data:

networks:
  default:
    name: fleetmon-network
